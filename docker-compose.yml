services:
  app:
    build: ./app
    container_name: water-app
    expose:
      - "8000"
    environment:
      - VIRTUAL_HOST=water.local
      - VIRTUAL_PORT=8000
    restart: unless-stopped
    networks:
      - proxy-net

  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./certs:/etc/nginx/certs
      - ./vhost.d:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
    environment:
      - GENERATE_SELF_SIGNED_CERT=1
      - SELF_SIGNED_CERT_DOMAIN=water.local
    networks:
      - proxy-net

networks:
  proxy-net:
    driver: bridge